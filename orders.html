<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiSetu - My Orders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <h1>📦 My Orders</h1>
            <p class="subtitle">મારા ઓર્ડર</p>
        </header>

        <div class="order-tabs">
            <button class="tab-btn active" data-tab="selling">Selling</button>
            <button class="tab-btn" data-tab="buying">Buying</button>
        </div>

        <div class="orders-container">
            <div id="sellingOrders" class="orders-section active">
                <h3>🌾 Orders Received</h3>
                <div id="farmerOrders" class="orders-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading orders...</p>
                    </div>
                </div>
            </div>

            <div id="buyingOrders" class="orders-section">
                <h3>🛒 Orders Placed</h3>
                <div id="customerOrders" class="orders-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading orders...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="add-product.html" class="nav-item">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Add</span>
        </a>
        <a href="products.html" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Market</span>
        </a>
        <a href="orders.html" class="nav-item active">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Orders</span>
        </a>
    </nav>

    <script type="module">
        import { supabase } from "./js/supabase.js";

        let user = (await supabase.auth.getUser()).data.user;

        let { data } = await supabase
            .from("orders")
            .select("*")
            .eq("customer_id", user.id);

        data.forEach(o => {
            customerOrders.innerHTML += `
                <div class="card">
                    Order : ${o.id}<br>
                    Status : ${o.order_status}
                </div>`;
        });
    </script>
</body>
</html>
